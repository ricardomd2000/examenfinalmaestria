    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useCallback } from 'react';
        import { createRoot } from 'react-dom/client';
        import { Building2, AlertTriangle, GitMerge, CheckCircle2, Database, BrainCircuit, Calculator, ShieldAlert, Activity, Users, LogOut, ChevronDown, ChevronUp, Share2 } from 'lucide-react';
        
        // --- CONFIGURACIÓN FIREBASE ---
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, signInWithEmailAndPassword, onAuthStateChanged } from 'firebase/auth';
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot } from 'firebase/firestore';

        const miFirebaseConfig = {
            apiKey: "AIzaSyBA8YmprgycPfClE9o2M1p8befxh-d4tiY",
            authDomain: "unidad2maestria.firebaseapp.com",
            projectId: "unidad2maestria",
            storageBucket: "unidad2maestria.firebasestorage.app",
            messagingSenderId: "999773546679",
            appId: "1:999773546679:web:a0fac0d6126fc9ef6f8532"
        };
            
        const app = initializeApp(miFirebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'unidad2maestria';

        // --- DATOS DE LOS CASOS ---
        const casos = [
            {
                id: 1,
                titulo: "Unidad 1: Atributos y Marco Legal - Riesgo Biomecánico",
                empresa: "AutoEnsambles del Norte (Planta de 500 operarios en línea de montaje)",
                problema: "Aumento progresivo de reportes informales de dolor lumbar y miembros superiores en el último trimestre. La empresa no tiene un panorama real de la magnitud del problema y necesita justificar intervenciones ergonómicas basándose en el marco legal (ej. GATISO de TME). Requieren un enfoque altamente sensible.",
                mision: "Seleccionar el tipo de vigilancia inicial para obtener un diagnóstico precoz, preciso y representativo de toda la población.",
                opciones: [
                    { id: 'A', titulo: "Vigilancia Pasiva", desc: "Revisar los registros de incapacidades médicas y diagnósticos emitidos por la EPS para identificar los casos confirmados que ya requirieron reposo.", puntaje: 2.0 },
                    { id: 'B', titulo: "Vigilancia Activa Universal", desc: "Aplicar proactivamente un cuestionario estandarizado de síntomas osteomusculares (ej. Nórdico) en los puestos de trabajo a la totalidad de los 500 operarios.", puntaje: 5.0 },
                    { id: 'C', titulo: "Vigilancia Centinela", desc: "Realizar exámenes físicos detallados (fisioterapeuta) exclusivamente a un grupo reducido de 20 operarios en las zonas históricamente más pesadas.", puntaje: 3.5 }
                ]
            },
            {
                id: 2,

                empresa: "Calzado Paso Firme (Uso intensivo de Tolueno y Xileno en pegantes)",
                problema: "Operarios de la zona de ensamble reportan mareos, cefaleas recurrentes y fatiga extrema al final del turno. Los recambios de aire miden normales, pero se sospecha absorción de carga tóxica por vía dérmica. Urge un método altamente específico y oportuno.",
                mision: "Determinar la estrategia de vigilancia que permita confirmar inequívocamente la dosis interna y la absorción real de estos solventes en el organismo humano (prueba Gold Standard).",
                opciones: [
                    { id: 'A', titulo: "Vigilancia Especializada (Biológica)", desc: "Implementar un programa de medición de biomarcadores (metabolitos en muestras de orina/sangre) específicos para estos solventes al final de la jornada.", puntaje: 5.0 },
                    { id: 'B', titulo: "Vigilancia de Seguimiento General (Ambiental)", desc: "Instalar continuamente dosímetros personales de gases en el cuello de los trabajadores para medir la concentración de vapores en el aire del entorno.", puntaje: 3.0 },
                    { id: 'C', titulo: "Vigilancia Pasiva Sindrómica", desc: "Registrar obligatoriamente en la historia clínica ocupacional los síntomas subjetivos reportados cada vez que un trabajador acude a enfermería.", puntaje: 1.5 }
                ]
            },
            {
                id: 3,
                titulo: "Unidad 3: Recolección y Análisis - Riesgo Psicosocial",
                empresa: "Atención Total BPO (Call Center con 800 asesores telefónicos)",
                problema: "Se reporta alta desmotivación, rotación acelerada de personal (30% semestral) y picos de ausentismo por patologías gástricas y psiquiátricas ligadas al estrés. Gerencia duda de la validez de las quejas y exige una evaluación irrefutable a nivel normativo.",
                mision: "Estructurar la recolección de datos primarios con una metodología que garantice alta confiabilidad, validez estandarizada y el respeto ético a la confidencialidad.",
                opciones: [
                    { id: 'A', titulo: "Batería Estandarizada Validada", desc: "Aplicar la Batería de Cuestionarios para Factores de Riesgo Psicosocial del Ministerio, garantizando la custodia de las respuestas bajo reserva de un psicólogo especialista.", puntaje: 5.0 },
                    { id: 'B', titulo: "Línea de Ayuda Interna Supervisada", desc: "Habilitar una línea o chat interno donde los supervisores de turno reciben, filtran y transcriben las quejas sobre carga mental antes de enviarlas a Talento Humano.", puntaje: 1.0 },
                    { id: 'C', titulo: "Monitoreo Retrospectivo de Indicadores", desc: "Levantar una matriz de datos secundarios basada exclusivamente en las tasas de ausentismo médico mensual, rotación y volumen de penalizaciones de calidad acumuladas.", puntaje: 3.5 }
                ]
            },
            {
                id: 4,
                titulo: "Unidad 3: Interpretación y Difusión - Ecos de la Mina",
                empresa: "Minerales Andinos (Mina subterránea c/ maquinaria pesada)",
                problema: "Prevalencia creciente y alarmante de Hipoacusia Neurosensorial inducida por perforadoras. El análisis ya arrojó un OR=4.5 asociando el daño al área norte. La empresa debe frenar la tendencia, cumplir normas técnicas y fomentar el autocuidado real.",
                mision: "Decidir la estrategia post-evaluación (divulgación) que sea éticamente responsable, transparente y logre la mayor apropiación de medidas preventivas por la población afectada.",
                opciones: [
                    { id: 'A', titulo: "Talleres Participativos con GES", desc: "Realizar campañas socializando las tendencias grupales (anonimizadas) directamente en talleres interactivos con los Grupos de Exposición Similar (GES) para generar estrategias conjuntas.", puntaje: 5.0 },
                    { id: 'B', titulo: "Informe Gerencial de Restricción", desc: "Concentrar los recursos en generar un modelo bio-estadístico exhaustivo que se presentará confidencialmente solo a nivel directivo para limitar la responsabilidad legal.", puntaje: 3.0 },
                    { id: 'C', titulo: "Alertas Masivas y Sanciones", desc: "Emitir circulares urgentes en las carteleras de ingreso notificando de la epidemia de sordera y aplicar comparendos sancionatorios inmediatos por no usar tapa-oídos.", puntaje: 1.5 }
                ]
            }
        ];

        // --- GENERADOR DE DATOS SIMULADOS ---
        const generarDatos = (casoId, opcionId) => {
            const data = [];
            const randomInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
            const randomChoice = (arr, weights) => {
                if (!weights) return arr[randomInt(0, arr.length - 1)];
                let i, sum = 0, r = Math.random();
                for (i in weights) { sum += weights[i]; if (r <= sum) return arr[i]; }
            };

            for (let i = 1; i <= 50; i++) {
                let row = { ID: `PAC-${casoId}${opcionId}-${1000 + i}` };
                if (casoId === 1) { 
                    if (opcionId === 'A') {
                        row['Edad'] = randomInt(22, 60); 
                        row['Incapacidad (Enfermo)'] = randomChoice(['Sí', 'No'], [0.25, 0.75]);
                        row['Días Perdidos'] = row['Incapacidad (Enfermo)'] === 'Sí' ? randomInt(3, 15) : 0;
                        row['Días Programados/Mes'] = 24; // Dato fijo para calcular tasa de ausentismo
                        row['Dx (CIE-10)'] = row['Incapacidad (Enfermo)'] === 'Sí' ? randomChoice(['M54.5', 'G56.0', 'M79.1']) : 'N/A';
                    } else if (opcionId === 'B') {
                        row['Expuesto (Carga Física)'] = randomChoice(['Sí', 'No'], [0.6, 0.4]); 
                        // Generamos una asociación lógica para el Odds Ratio
                        let probEnfermedad = row['Expuesto (Carga Física)'] === 'Sí' ? 0.4 : 0.1; 
                        row['Enfermo (Dolor/TME)'] = Math.random() < probEnfermedad ? 'Sí' : 'No';
                        row['Antigüedad (Años)'] = randomInt(1, 15);
                    } else if (opcionId === 'C') {
                        row['Puesto Crítico (Expuesto)'] = randomChoice(['Sí', 'No'], [0.3, 0.7]); 
                        let probHallazgo = row['Puesto Crítico (Expuesto)'] === 'Sí' ? 0.7 : 0.2;
                        row['Hallazgo Clínico (Enfermo)'] = Math.random() < probHallazgo ? 'Anormal' : 'Normal'; 
                        row['Reubicación'] = row['Hallazgo Clínico (Enfermo)'] === 'Anormal' ? randomChoice(['Sí', 'No']) : 'No';
                    }
                } 
                else if (casoId === 2) { 
                    if (opcionId === 'A') {
                        row['Uso EPP Inadecuado (Expuesto)'] = randomChoice(['Sí', 'No'], [0.4, 0.6]); 
                        let acHip = row['Uso EPP Inadecuado (Expuesto)'] === 'Sí' ? (Math.random() * 2.5 + 0.5).toFixed(2) : (Math.random() * 1.5).toFixed(2);
                        row['Ac. Hipúrico'] = acHip; 
                        row['Enfermo (BEI >1.6)'] = parseFloat(acHip) > 1.6 ? 'Sí' : 'No';
                    } else if (opcionId === 'B') {
                        row['Zona Alta Concentración (Expuesto)'] = randomChoice(['Sí', 'No'], [0.5, 0.5]); 
                        let tolueno = row['Zona Alta Concentración (Expuesto)'] === 'Sí' ? (Math.random() * 60 + 20).toFixed(1) : (Math.random() * 40).toFixed(1);
                        row['Tolueno (ppm)'] = tolueno; 
                        row['TLV Excedido'] = parseFloat(tolueno) > 50 ? 'Sí' : 'No';
                        row['Reporta Síntomas (Enfermo)'] = parseFloat(tolueno) > 40 ? randomChoice(['Sí', 'No'], [0.8, 0.2]) : 'No';
                    } else if (opcionId === 'C') {
                        row['Turno Nocturno (Expuesto)'] = randomChoice(['Sí', 'No']); 
                        let probSintoma = row['Turno Nocturno (Expuesto)'] === 'Sí' ? 0.5 : 0.2;
                        row['Cefalea/Mareo (Enfermo)'] = Math.random() < probSintoma ? 'Sí' : 'No';
                        row['Irritación Piel'] = randomChoice(['Sí', 'No'], [0.15, 0.85]);
                    }
                }
                else if (casoId === 3) { 
                    if (opcionId === 'A') {
                        row['Alta Demanda (Expuesto)'] = randomChoice(['Sí', 'No'], [0.6, 0.4]); 
                        let probEstres = row['Alta Demanda (Expuesto)'] === 'Sí' ? 0.7 : 0.2;
                        row['Estrés Severo (Enfermo)'] = Math.random() < probEstres ? 'Sí' : 'No';
                        row['Dominio Control'] = randomChoice(['Bajo', 'Medio', 'Alto']); 
                    } else if (opcionId === 'B') {
                        row['Llamó Ayuda'] = 'Sí'; row['Motivo'] = randomChoice(['Ansiedad', 'Burnout', 'Conflicto']);
                        row['Turno Rotativo (Expuesto)'] = randomChoice(['Sí', 'No']);
                        let probPsiq = row['Turno Rotativo (Expuesto)'] === 'Sí' ? 0.6 : 0.2;
                        row['A Psiquiatría (Enfermo)'] = Math.random() < probPsiq ? 'Sí' : 'No';
                    } else if (opcionId === 'C') {
                        row['Meta Ventas Alta (Expuesto)'] = randomChoice(['Sí', 'No']); 
                        row['Días Ausencia'] = randomInt(0, 4); 
                        row['Días Programados/Mes'] = 20;
                        row['Alerta Proxy (Enfermo)'] = (row['Días Ausencia'] > 1) ? 'Sí' : 'No';
                    }
                }
                else if (casoId === 4) { 
                    if (opcionId === 'A') {
                        row['Área Perforación (Expuesto)'] = randomChoice(['Sí', 'No'], [0.4, 0.6]); 
                        let probAudio = row['Área Perforación (Expuesto)'] === 'Sí' ? 0.5 : 0.1;
                        row['Descenso 4000Hz (Enfermo)'] = Math.random() < probAudio ? 'Sí' : 'No';
                        row['Uso EPP'] = randomChoice(['Frecuente', 'Ocasional']);
                    } else if (opcionId === 'B') {
                        row['GES > 85dB (Expuesto)'] = randomChoice(['Sí', 'No'], [0.5, 0.5]); 
                        row['Uso EPP (%)'] = row['GES > 85dB (Expuesto)'] === 'Sí' ? randomInt(60, 100) : randomInt(30, 90);
                        let probTinnitus = row['GES > 85dB (Expuesto)'] === 'Sí' && row['Uso EPP (%)'] < 80 ? 0.6 : 0.1;
                        row['Tinnitus (Enfermo)'] = Math.random() < probTinnitus ? 'Sí' : 'No';
                    } else if (opcionId === 'C') {
                        row['EPP Roto/Sucio (Expuesto)'] = randomChoice(['Sí', 'No'], [0.3, 0.7]); 
                        let probQueja = row['EPP Roto/Sucio (Expuesto)'] === 'Sí' ? 0.8 : 0.2;
                        row['Queja Confort (Enfermo)'] = Math.random() < probQueja ? 'Sí' : 'No';
                        row['Hora'] = randomChoice(['Inicio', 'Mitad', 'Fin']);
                    }
                }
                data.push(row);
            }
            return data;
        };

        // --- COMPONENTE PRINCIPAL ---
        const App = () => {
            const [user, setUser] = useState(null); 
            const [appUser, setAppUser] = useState(null); 
            
            const [studentData, setStudentData] = useState(null); 
            const [allSubmissions, setAllSubmissions] = useState([]); 
            
            const [activeTab, setActiveTab] = useState('caso');
            const [localAnalysis, setLocalAnalysis] = useState('');
            const [localAtributo, setLocalAtributo] = useState('');
            const [localJustificacion, setLocalJustificacion] = useState('');
            const [localDifusion, setLocalDifusion] = useState([]);
            const [confirmDialog, setConfirmDialog] = useState({ isOpen: false, casoId: null, opcionId: null });

            useEffect(() => {
                if (!auth) return;
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user || !db || !appUser) return;
                
                const q = collection(db, 'artifacts', appId, 'public', 'data', 'evaluaciones_sst');
                const unsubscribe = onSnapshot(q, (snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setAllSubmissions(data);
                    
                    if (appUser && appUser.role === 'student') {
                        const myDoc = data.find(d => d.email === appUser.email);
                        if (myDoc) {
                            setStudentData(myDoc);
                            if (localAnalysis === '' && myDoc.analysis) setLocalAnalysis(myDoc.analysis);
                            if (localAtributo === '' && myDoc.atributo) setLocalAtributo(myDoc.atributo);
                            if (localJustificacion === '' && myDoc.justificacion) setLocalJustificacion(myDoc.justificacion);
                            // Avoid setting to empty array and resetting by matching exact reference. Ensure to pull data if difusion has length
                            if (localDifusion.length === 0 && myDoc.difusion?.length > 0) setLocalDifusion(myDoc.difusion);
                        }
                    }
                }, (err) => console.error("Error Snapshot:", err));

                return () => unsubscribe();
            }, [user, appUser, db]);

            const handleLogin = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                let email = formData.get('email').trim().toLowerCase();
                if (!email) return;

                const role = (email === 'ricardomd2000@gmail.com' || email.includes('docente') || email.includes('profesor')) ? 'teacher' : 'student';

                try {
                    if (role === 'teacher') {
                        const password = prompt("Ingrese su contraseña de docente:");
                        if (!password) return;
                        await signInWithEmailAndPassword(auth, email, password);
                    } else {
                        await signInAnonymously(auth);
                    }
                } catch (error) {
                    console.error("Error Auth:", error);
                    let msg = error.message;
                    if (error.code === 'auth/admin-restricted-operation') {
                        msg = "El acceso anónimo no está habilitado. Por favor activa el proveedor Anónimo en la Consola de Firebase.";
                    } else if (error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
                        msg = "Contraseña incorrecta.";
                    }
                    alert("Error al entrar: " + msg);
                    return; // Detener inicio de sesión si falla auth
                }
                
                // Asegurarse de que el usuario actual ya está registrado en la variable auth
                const currentUser = auth.currentUser;

                if (role === 'student' && db && currentUser) {
                    const docId = email.replace(/[^a-zA-Z0-9]/g, '_'); 
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'evaluaciones_sst', docId);
                    const docSnap = await getDoc(docRef);
                    
                    if (!docSnap.exists()) {
                        const randomCase = Math.floor(Math.random() * 4) + 1;
                        await setDoc(docRef, {
                            email: email,
                            role: 'student',
                            assignedCase: randomCase,
                            selection: null,
                            analysis: '',
                            atributo: '',
                            justificacion: '',
                            difusion: [],
                            datosSimulados: null,
                            timestamp: new Date().toISOString()
                        });
                    }
                }
                setAppUser({ email, role });
                setActiveTab(role === 'teacher' ? 'dashboard' : 'caso');
            };

            const handleLogout = () => {
                auth.signOut();
                setAppUser(null);
                setStudentData(null);
                setLocalAnalysis('');
            };

            const promptConfirmSelection = (casoId, opcionId) => {
                if (studentData?.selection) return; 
                setConfirmDialog({ isOpen: true, casoId, opcionId });
            };

            const confirmSelection = async () => {
                const { casoId, opcionId } = confirmDialog;
                setConfirmDialog({ isOpen: false, casoId: null, opcionId: null });
                
                if (!db || !appUser) return;
                const nuevosDatos = generarDatos(casoId, opcionId);
                const docId = appUser.email.replace(/[^a-zA-Z0-9]/g, '_');
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'evaluaciones_sst', docId), {
                    selection: opcionId,
                    datosSimulados: nuevosDatos
                }, { merge: true });
            };

            const handleAnalysisBlur = async () => {
                handleDataBlur('analysis', localAnalysis);
            };

            const handleDataBlur = async (field, value) => {
                if (!db || !appUser || !studentData) return;
                // Si el valor no ha cambiado, no hacer ping a Firebase
                if (studentData[field] === value) return;
                // Si es un arreglo, necesitamos comparar diferente para evitar ciclos.
                if (Array.isArray(value) && Array.isArray(studentData[field]) && value.length === studentData[field].length && value.every((v, i) => v === studentData[field][i])) return;

                const docId = appUser.email.replace(/[^a-zA-Z0-9]/g, '_');
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'evaluaciones_sst', docId), {
                    [field]: value
                }, { merge: true });
            };

            const toggleDifusion = (entity) => {
                const newDifusion = localDifusion.includes(entity) 
                    ? localDifusion.filter(e => e !== entity) 
                    : [...localDifusion, entity];
                setLocalDifusion(newDifusion);
                handleDataBlur('difusion', newDifusion);
            };

            const handleSubmitExam = async () => {
                const confirmar = window.confirm("¿Estás seguro de terminar tu examen? Ya no podrás modificar tus respuestas de los Pasos 4, 5 y 6.");
                if (!confirmar) return;
                
                if (!db || !appUser) return;
                const docId = appUser.email.replace(/[^a-zA-Z0-9]/g, '_');
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'evaluaciones_sst', docId), {
                    isSubmitted: true
                }, { merge: true });
            };

            // --- VISTAS GLOBALES ---
            const Calculadora = ({ isEmbedded = false, datos = null }) => {
                const [calcType, setCalcType] = useState('prevalencia');
                const [val1, setVal1] = useState(''); const [val2, setVal2] = useState('');
                const [val3, setVal3] = useState(''); const [val4, setVal4] = useState('');

                // Calcular valores reales basados en la tabla simulada
                const esperados = React.useMemo(() => {
                    if (!datos) return null;
                    let casos = 0, poblacion = datos.length, A = 0, B = 0, C = 0, D = 0, diasPerdidos = 0, diasProgramados = 0;
                    datos.forEach(row => {
                        let esEnfermo = false, esExpuesto = false;
                        Object.entries(row).forEach(([key, val]) => {
                            if (key.includes('(Enfermo)')) {
                                if (val === 'Sí' || val === 'Anormal') esEnfermo = true;
                            }
                            if (key.includes('(Expuesto)')) {
                                if (val === 'Sí') esExpuesto = true;
                            }
                            if (key === 'Días Perdidos' || key === 'Días Ausencia') diasPerdidos += parseInt(val) || 0;
                            if (key === 'Días Programados/Mes') diasProgramados += parseInt(val) || 0;
                        });
                        if (esEnfermo) casos++;
                        if (esExpuesto && esEnfermo) A++;
                        if (esExpuesto && !esEnfermo) B++;
                        if (!esExpuesto && esEnfermo) C++;
                        if (!esExpuesto && !esEnfermo) D++;
                    });
                    if (diasProgramados === 0) diasProgramados = poblacion * 24;
                    return { casos, poblacion, A, B, C, D, diasPerdidos, diasProgramados };
                }, [datos]);

                const renderInputs = () => {
                    if (calcType === 'prevalencia' || calcType === 'incidencia' || calcType === 'ausentismo') {
                        return (
                            <div className="grid grid-cols-2 gap-4 mt-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">
                                        {calcType === 'prevalencia' ? 'Nº Casos Existentes' : calcType === 'incidencia' ? 'Nº Casos Nuevos' : 'Total Días Perdidos por Incapacidad'}
                                    </label>
                                    <input type="number" className="w-full p-2 border border-gray-300 rounded outline-none focus:border-blue-500 bg-white" value={val1} onChange={e=>setVal1(e.target.value)} />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">

                                    <input type="number" className="w-full p-2 border border-gray-300 rounded outline-none focus:border-blue-500 bg-white" value={val2} onChange={e=>setVal2(e.target.value)} />
                                </div>
                            </div>

                    }
                    if (calcType === 'or') {
                        return (
                            <div className="mt-4 grid grid-cols-2 gap-4">
                                <div className="col-span-2 text-sm text-gray-600 font-bold mb-1">Tabla 2x2 Clásica</div>
                                <div className="bg-red-50 p-3 rounded border border-red-200 shadow-sm">
                                    <label className="block text-xs font-bold text-red-800 mb-1">Expuestos ENFERMOS (A)</label>
                                    <input type="number" className="w-full p-1 border border-red-300 rounded bg-white" value={val1} onChange={e=>setVal1(e.target.value)} />
                                </div>
                                <div className="bg-green-50 p-3 rounded border border-green-200 shadow-sm">
                                    <label className="block text-xs font-bold text-green-800 mb-1">Expuestos SANOS (B)</label>
                                    <input type="number" className="w-full p-1 border border-green-300 rounded bg-white" value={val2} onChange={e=>setVal2(e.target.value)} />
                                </div>
                                <div className="bg-orange-50 p-3 rounded border border-orange-200 shadow-sm">
                                    <label className="block text-xs font-bold text-orange-800 mb-1">NO Expuestos ENFERMOS (C)</label>
                                    <input type="number" className="w-full p-1 border border-orange-300 rounded bg-white" value={val3} onChange={e=>setVal3(e.target.value)} />
                                </div>
                                <div className="bg-blue-50 p-3 rounded border border-blue-200 shadow-sm">
                                    <label className="block text-xs font-bold text-blue-800 mb-1">NO Expuestos SANOS (D)</label>
                                    <input type="number" className="w-full p-1 border border-blue-300 rounded bg-white" value={val4} onChange={e=>setVal4(e.target.value)} />
                                </div>
                            </div>

                    }
                };

                const isCompletePrevalencia = val1 !== '' && val2 !== '';
                const isCompleteOR = val1 !== '' && val2 !== '' && val3 !== '' && val4 !== '';

                let resultUi = <div className="text-gray-400 italic">Ingresa los valores de la tabla para ver el resultado</div>;

                if (calcType === 'prevalencia' || calcType === 'incidencia') {
                    if (isCompletePrevalencia) {
                        if (isEmbedded && esperados && (parseFloat(val1) !== esperados.casos || parseFloat(val2) !== esperados.poblacion)) {
                            resultUi = <div className="text-red-600 font-bold text-lg animate-pulse flex flex-col items-center gap-2"><AlertTriangle className="w-6 h-6" /> <span className="text-center">Datos incorrectos. Es importante contar cuidadosamente los pacientes de la tabla.</span></div>;
                        } else {
                            if (calcType === 'prevalencia') resultUi = <div className="text-2xl font-bold text-blue-600">Prevalencia: {((parseFloat(val1) / parseFloat(val2)) * 100).toFixed(2)}%</div>;

                        }
                    }
                } else if (calcType === 'ausentismo') {
                    if (isCompletePrevalencia) {
                        if (isEmbedded && esperados && (parseFloat(val1) !== esperados.diasPerdidos || parseFloat(val2) !== esperados.diasProgramados)) {
                            resultUi = <div className="text-red-600 font-bold text-lg animate-pulse flex flex-col items-center gap-2"><AlertTriangle className="w-6 h-6" /> <span className="text-center">Datos incorrectos. Suma bien todos los días perdidos y programados de la tabla.</span></div>;
                        } else {
                            resultUi = <div className="text-2xl font-bold text-blue-600">Tasa: {((parseFloat(val1) / parseFloat(val2)) * 100).toFixed(2)}% de ausentismo</div>;
                        }
                    }
                } else if (calcType === 'or') {
                    if (isCompleteOR) {
                        if (isEmbedded && esperados && (parseFloat(val1) !== esperados.A || parseFloat(val2) !== esperados.B || parseFloat(val3) !== esperados.C || parseFloat(val4) !== esperados.D)) {
                            resultUi = <div className="text-red-600 font-bold text-lg animate-pulse flex flex-col items-center gap-2"><AlertTriangle className="w-6 h-6" /> <span className="text-center">Datos incorrectos en la matriz 2x2. Cuenta bien las variables (Expuesto y Enfermo).</span></div>;
                        } else {
                            const num1 = parseFloat(val1); const num2 = parseFloat(val2); const num3 = parseFloat(val3); const num4 = parseFloat(val4);

                                    <div className="text-2xl font-bold text-blue-600">Odds Ratio (OR): {or}</div>

                                </div>

                                    {tipo === 'or' ? 'Odds Ratio' : tipo}

                        <div className="bg-gray-50 p-4 rounded-lg border border-gray-200 mb-6">{renderInputs()}</div>

                                className={`w-full flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-lg transition-colors ${activeTab === 'calculadora' ? 'tab-active' : 'tab-inactive'}`}

                                            </div>
                                        </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div>
                                            <span className="text-xs font-bold uppercase text-gray-500">Atributo SVE (Paso 4):</span>
                                            <p className="text-sm font-medium text-indigo-700 mt-1">{est.atributo || <span className="text-gray-400 italic">No seleccionado</span>}</p>
                                            <div className="bg-gray-50 p-3 rounded border border-gray-200 mt-1 text-sm text-gray-700">
                                                {est.justificacion || <span className="text-gray-400 italic">Sin justificación</span>}

                                        <span className="text-xs font-bold uppercase text-gray-500">Decisiones Estratégicas (Paso 6):</span>

                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">

                                            className={`p-4 rounded-xl border-2 transition-all

                                                    <th key={col} className="px-5 py-4 text-center align-middle font-black text-gray-700 uppercase tracking-wider text-xs whitespace-nowrap border-b-2 border-gray-300 border-r border-gray-200 bg-gray-100">{col}</th>
                                                ))}
                                            </tr>
                                        </thead>
                                        <tbody className="bg-white divide-y divide-gray-200">
                                            {datos.map((row, idx) => (
                                                <tr key={idx} className={`${idx % 2 === 0 ? 'bg-white' : 'bg-gray-50'} hover:bg-blue-100 transition-colors`}>
                                                    {Object.keys(datos[0]).map((colKey, i) => {
                                                        const val = row[colKey] !== undefined ? row[colKey] : '-';
                                                        return (
                                                            <td key={i} className="px-5 py-3 whitespace-nowrap text-gray-800 font-medium text-center align-middle border-r border-gray-100">
                                                                {val === 'Sí' || val === 'Anormal' || val === 'Muy Alto' || val === 'Incorrecto' || val === 'Rotos' || val === 'Severa' || val === 'Alta' ? <span className="text-red-700 font-black bg-red-100 border border-red-300 shadow-sm px-3 py-1.5 rounded-md">{val}</span> : val}
                                                            </td>
                                                        );
                                                    })}
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {/* Paso 3: Calculadora Embebida */}
                        {datos && <Calculadora isEmbedded={true} datos={datos} />}

                        {/* Paso 4: Evaluación de Atributos */}
                        {datos && (
                            <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6 animate-fade-in">
                                <h2 className="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
                                    <ShieldAlert className="w-5 h-5 text-indigo-500" /> Paso 4: Evaluación de Atributos del SVE
                                </h2>
                                <div className="mb-4">
                                    <label className="block text-sm font-bold text-gray-700 mb-2">Selecciona el atributo epidemiológico principal que destaca en tu elección:</label>
                                    <select 
                                        className="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-indigo-500 outline-none disabled:bg-gray-100 disabled:cursor-not-allowed"
                                        value={localAtributo}
                                        disabled={studentData?.isSubmitted}
                                        onChange={(e) => { setLocalAtributo(e.target.value); handleDataBlur('atributo', e.target.value); }}
                                    >
                                        <option value="">Selecciona un atributo...</option>
                                        <option value="Alta Sensibilidad">Alta Sensibilidad</option>
                                        <option value="Alta Especificidad">Alta Especificidad</option>
                                        <option value="Representatividad">Representatividad Poblacional</option>
                                        <option value="Oportunidad">Oportunidad de los datos</option>
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-sm font-bold text-gray-700 mb-2">Justifica tu elección:</label>
                                    <textarea 
                                        className="w-full h-24 p-3 border border-gray-300 rounded focus:ring-2 focus:ring-indigo-500 outline-none text-sm bg-gray-50 resize-y disabled:bg-gray-100 disabled:cursor-not-allowed"
                                        placeholder="Ej: Elegí esta estrategia porque su alta sensibilidad permite detectar los casos..."
                                        value={localJustificacion}
                                        disabled={studentData?.isSubmitted}
                                        onChange={(e) => setLocalJustificacion(e.target.value)}
                                        onBlur={() => handleDataBlur('justificacion', localJustificacion)}
                                    ></textarea>
                                </div>
                            </div>
                        )}

                        {/* Paso 5: Plan de Difusión */}
                        {datos && (
                            <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6 animate-fade-in">
                                <h2 className="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
                                    <Share2 className="w-5 h-5 text-teal-500" /> Paso 5: Plan de Difusión de la Información
                                </h2>
                                <p className="text-sm text-gray-600 mb-4">Selecciona a quiénes deberías reportar estos hallazgos (puedes elegir varios):</p>
                                <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3">
                                    {['Gerencia General', 'COPASST', 'ARL (Administradora)', 'Grupos de Exposición Similar', 'Entidades Regulatorias', 'Comité de Convivencia'].map(entidad => (
                                        <label key={entidad} className="flex items-center gap-2 p-3 border border-gray-200 rounded-lg cursor-pointer hover:bg-gray-50">
                                            <input 
                                                type="checkbox" 
                                                className="w-4 h-4 text-teal-600 rounded disabled:opacity-50"
                                                checked={localDifusion.includes(entidad)}
                                                disabled={studentData?.isSubmitted}
                                                onChange={() => toggleDifusion(entidad)}
                                            />
                                            <span className="text-sm text-gray-700 font-medium">{entidad}</span>
                                        </label>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* Paso 6: Análisis Estratégico */}
                        {datos && (
                            <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6 border-l-4 border-l-purple-500 animate-fade-in">
                                <h2 className="text-lg font-bold text-gray-800 mb-2 flex items-center gap-2">
                                    <BrainCircuit className="w-5 h-5 text-purple-500" /> Paso 6: Decisiones Estratégicas
                                </h2>
                                <p className="text-sm text-gray-600 mb-4">Basado en los cálculos del Paso 3 y la observación de la tabla, redacta tus conclusiones y qué decisiones operativas debe tomar la empresa para mitigar el riesgo.</p>
                                <textarea 
                                    className="w-full h-40 p-4 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 outline-none text-sm bg-gray-50 resize-y disabled:bg-gray-100 disabled:cursor-not-allowed"
                                    placeholder="Ej: Tras calcular el Odds Ratio (OR = 3.5), se confirma que la exposición a [Riesgo] está directamente asociada con [Enfermedad]. Por lo tanto, la decisión estratégica será..."
                                    value={localAnalysis}
                                    disabled={studentData?.isSubmitted}
                                    onChange={(e) => setLocalAnalysis(e.target.value)}
                                    onBlur={handleAnalysisBlur}
                                ></textarea>
                                <div className="flex justify-end mt-2 text-xs font-bold text-gray-500">
                                    {localAnalysis !== studentData.analysis ? <span className="text-orange-500 animate-pulse">Hay cambios sin guardar... Haz clic fuera del cuadro para guardar.</span> : <span className="text-green-600 flex items-center gap-1"><CheckCircle2 className="w-4 h-4" /> Guardado en la nube</span>}
                                </div>
                            </div>
                        )}

                        {/* Botón de Envío Final */}
                        {datos && !studentData?.isSubmitted && (
                            <div className="flex justify-center mt-8 mb-4">
                                <button
                                    onClick={handleSubmitExam}
                                    className="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-8 rounded-full shadow-lg flex items-center gap-2 transition-transform transform hover:scale-105"
                                >
                                    <CheckCircle2 className="w-6 h-6" /> Finalizar y Enviar Examen
                                </button>
                            </div>
                        )}
                        {datos && studentData?.isSubmitted && (
                            <div className="flex justify-center mt-8 mb-4">
                                <span className="bg-green-100 text-green-800 border border-green-200 font-bold py-3 px-8 rounded-full flex items-center gap-2 shadow-sm">
                                    <CheckCircle2 className="w-6 h-6 text-green-600" /> Examen Terminado y Enviado Correctamente
                                </span>
                            </div>
                        )}
                    </div>
                );
            };

            // --- MAIN RENDER DE LA APLICACIÓN ---
            if (!appUser) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-gray-100 p-4">
                        <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md animate-fade-in">
                            <div className="flex justify-center mb-6">
                                <div className="bg-blue-100 p-4 rounded-full"><ShieldAlert className="w-10 h-10 text-blue-600" /></div>
                            </div>
                            <h1 className="text-2xl font-bold text-center text-gray-800 mb-2">Simulador SST</h1>
                            <p className="text-center text-gray-500 text-sm mb-6">Plataforma de Casos Clínicos y Vigilancia</p>
                            
                            <form onSubmit={handleLogin} className="space-y-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Correo Institucional</label>
                                    <input 
                                        type="email" 
                                        name="email"
                                        required 
                                        placeholder="usuario@universidad.edu.co"
                                        className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                                    />
                                </div>
                                <button type="submit" className="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition-colors">
                                    Ingresar al Simulador
                                </button>
                            </form>
                            <div className="mt-6 p-4 bg-gray-50 rounded-lg border border-gray-200 text-xs text-gray-500">
                                <strong>Nota Docentes:</strong> Ingrese un correo que contenga la palabra <span className="text-blue-600 font-semibold">"docente"</span> para acceder al panel de control y ver el progreso de los estudiantes.
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex min-h-screen bg-gray-100">
                    {renderSidebar()}
                    <div className="flex-1 ml-64 p-8">
                        {activeTab === 'caso' && renderStudentView()}
                        {activeTab === 'dashboard' && renderTeacherView()}
                        {activeTab === 'calculadora' && <Calculadora />}
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
